# native_sim: no Wi-Fi hardware — use host offloaded sockets.
# Zephyr POSIX target is Linux-only; build/run on WSL or Linux (not native macOS).
CONFIG_WIFI=n
CONFIG_NET_L2_WIFI_MGMT=n

CONFIG_ETH_NATIVE_TAP=n
CONFIG_NET_DRIVERS=y
CONFIG_NET_SOCKETS_OFFLOAD=y
CONFIG_NET_NATIVE_OFFLOADED_SOCKETS=y
CONFIG_NET_IPV6_DAD=n

CONFIG_POSIX_API=y

# Host provides routing; disable Zephyr Wi-Fi DHCP client path.
CONFIG_NET_DHCPV4=n
